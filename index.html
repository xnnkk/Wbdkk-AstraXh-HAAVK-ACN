<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACN客户端导向页 - 选择站点</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
      background: #121212;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #64b5f6;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
    }
    /* 状态区域 */
    .status-wrap {
      margin-bottom: 28px;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(100,181,246,0.15);
      border-top: 3px solid #64b5f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text {
      font-size: 14px;
      color: #888;
    }
    .status-text.success { color: #4caf50; }
    .status-text.error { color: #f44336; }
    /* 隧道地址显示 */
    .url-box {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 24px;
      display: none;
      word-break: break-all;
    }
    .url-box.show { display: block; }
    .url-label {
      font-size: 11px;
      color: #555;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .url-value {
      font-size: 13px;
      color: #64b5f6;
    }
    /* 按钮组 */
    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
      border: 2px solid #444;
      background: #1e1e1e;
      color: #e0e0e0;
      letter-spacing: 1px;
    }
    .btn:hover {
      border-color: #64b5f6;
      background: #2d2d2d;
    }
    .btn-primary {
      background: linear-gradient(135deg, #64b5f6, #42a5f5);
      color: #0f0f0f;
      border-color: #64b5f6;
    }
    .btn-primary:hover {
      box-shadow: 0 0 20px rgba(100,181,246,0.35);
      background: linear-gradient(135deg, #64b5f6, #42a5f5);
    }
    /* 页脚 */
    .retry-btn {
      display: none;
      margin-top: 16px;
      padding: 10px 24px;
      background: #1e1e1e;
      border: 2px solid #f44336;
      color: #f44336;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .retry-btn:hover {
      background: #2d2d2d;
    }
    .retry-btn.show { display: inline-block; }
    /* 页脚 */
    .footer {
      margin-top: 36px;
      font-size: 11px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">ACN客户端导向页</div>
    <div class="subtitle">请选择要访问的站点</div>

    <!-- 状态 -->
    <div class="status-wrap">
      <div class="spinner" id="spinner"></div>
      <div class="status-text" id="statusText">正在获取隧道地址...</div>
    </div>

    <!-- 隧道地址 -->
    <div class="url-box" id="urlBox">
      <div class="url-label">当前隧道地址</div>
      <div class="url-value" id="urlValue"></div>
    </div>

    <!-- 按钮 -->
    <div class="btn-group" id="btnGroup" style="display:none;">
      <a class="btn btn-primary" id="btnMain" href="#">进入主站</a>
      <a class="btn" id="btnDownload" href="#">文件下载</a>
    </div>

    <!-- 重试 -->
    <button class="retry-btn" id="retryBtn" onclick="init()">重新获取</button>

    <div class="footer">&copy; 2026 ACN客户端导向页 All rights reserved.<br>本网站所有权归 忘本的可可 所有</div>
  </div>

  <script>
    // ============================================================
    // 配置
    // ============================================================
    var REPO = 'wbdkk/Wbdkk-AstraXh-HAAVK-ACN';
    // 多源 URL 列表（按优先级排序）
    // 1. 相对路径（同源，GitHub Pages，国内最稳定但可能有缓存延迟）
    // 2. jsdelivr CDN（国内通常可访问，缓存约12小时）
    // 3. raw.githubusercontent.com（最新但国内可能被墙）
    var URL_SOURCES = [
      'url.txt?t=' + Date.now(),
      'https://cdn.jsdelivr.net/gh/' + REPO + '@main/url.txt?t=' + Date.now(),
      'https://raw.githubusercontent.com/' + REPO + '/main/url.txt?t=' + Date.now()
    ];

    // ============================================================
    // 兼容性工具：XMLHttpRequest GET（不依赖 fetch/async）
    // ============================================================
    function httpGet(url, onSuccess, onError) {
      var xhr = new XMLHttpRequest();
      xhr.timeout = 8000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            onSuccess(xhr.responseText.trim());
          } else {
            onError('HTTP ' + xhr.status);
          }
        }
      };
      xhr.ontimeout = function() { onError('timeout'); };
      xhr.onerror = function() { onError('network error'); };
      try {
        xhr.open('GET', url, true);
        xhr.send();
      } catch (e) {
        onError(e.message);
      }
    }

    // ============================================================
    // 多源尝试获取 URL
    // ============================================================
    function fetchTunnelUrl(callback) {
      var index = 0;
      var tried = 0;
      var total = URL_SOURCES.length;

      function tryNext() {
        if (index >= total) {
          callback(null, '所有源均无法获取地址');
          return;
        }
        var src = URL_SOURCES[index];
        var srcName = index === 0 ? '同源' : (index === 1 ? 'jsdelivr' : 'raw.githubusercontent');
        index++;

        httpGet(src, function(text) {
          if (text && text.indexOf('http') === 0) {
            console.log('[redirect] 成功从 ' + srcName + ' 获取: ' + text);
            callback(text, null);
          } else {
            console.log('[redirect] ' + srcName + ' 返回无效: ' + text);
            tried++;
            tryNext();
          }
        }, function(err) {
          console.log('[redirect] ' + srcName + ' 失败: ' + err);
          tried++;
          tryNext();
        });
      }

      tryNext();
    }

    // ============================================================
    // 主逻辑
    // ============================================================
    function init() {
      var spinner = document.getElementById('spinner');
      var statusText = document.getElementById('statusText');
      var urlBox = document.getElementById('urlBox');
      var urlValue = document.getElementById('urlValue');
      var btnGroup = document.getElementById('btnGroup');
      var btnMain = document.getElementById('btnMain');
      var btnDownload = document.getElementById('btnDownload');
      var retryBtn = document.getElementById('retryBtn');

      // 重置 UI
      spinner.style.display = 'block';
      statusText.className = 'status-text';
      statusText.textContent = '正在获取隧道地址...';
      urlBox.classList.remove('show');
      btnGroup.style.display = 'none';
      retryBtn.classList.remove('show');

      fetchTunnelUrl(function(url, err) {
        if (err) {
          spinner.style.display = 'none';
          statusText.className = 'status-text error';
          statusText.textContent = '获取隧道地址失败';
          retryBtn.classList.add('show');
          return;
        }

        // 成功获取 URL
        spinner.style.display = 'none';
        statusText.className = 'status-text success';
        statusText.textContent = '地址获取成功，请选择要访问的站点';

        // 显示隧道地址
        urlValue.textContent = url;
        urlBox.classList.add('show');

        // 设置按钮链接（直接跳转当前页）
        var mainUrl = url.replace(/\/+$/, '');
        var dlUrl = mainUrl + '/download/';
        btnMain.href = mainUrl;
        btnDownload.href = dlUrl;

        // 显示按钮
        btnGroup.style.display = 'flex';
      });
    }

    // ============================================================
    // 版本检查（强制刷新缓存）
    // ============================================================
    (function() {
      var CURRENT_VERSION = '7';
      try {
        var stored = localStorage.getItem('redirect_page_version');
        if (stored !== CURRENT_VERSION) {
          localStorage.setItem('redirect_page_version', CURRENT_VERSION);
        }
      } catch (e) {}
      init();
    })();
  </script>
</body>
</html>
