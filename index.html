<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACN 客户端重定向页面</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', '苹方', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #121212;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-weight: 500;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 2.5rem;
      color: #64b5f6;
      letter-spacing: 2px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
      max-width: 600px;
      width: 100%;
    }
    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .card:hover {
      border-color: #64b5f6;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(100,181,246,0.15);
    }
    .card .icon {
      font-size: 2.8rem;
      line-height: 1;
    }
    .card .label {
      font-size: 1.15rem;
      font-weight: 600;
    }
    .card .desc {
      font-size: 0.85rem;
      color: #888;
    }
    .status {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #666;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>ACN 客户端重定向页面</h1>
  <div class="grid">
    <a class="card" id="card-main" href="#" target="_blank" rel="noopener">
      <span class="icon">💻</span>
      <span class="label">主站</span>
      <span class="desc">BTR-公会</span>
    </a>
    <a class="card" id="card-dl" href="#" target="_blank" rel="noopener">
      <span class="icon">📂</span>
      <span class="label">文件下载</span>
      <span class="desc">下载中心</span>
    </a>
  </div>
    <div class="status" id="status">正在获取隧道地址…</div>
    <div class="footer">© 2026 WBDKK-ACN. All rights reserved.</div>

  <script>
    (async () => {
      const API = 'https://api.github.com';
      const REPO = 'Wbdkk/Wbdkk-AstraXh-HAAVK-ACN';
      const BRANCH = 'main';
      const TXT_PATH = 'url.txt';

      async function fetchRaw() {
        const raw = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${TXT_PATH}?_=${Date.now()}`;
        const r = await fetch(raw);
        if (!r.ok) throw new Error('无法读取 url.txt');
        return (await r.text()).trim();
      }

      async function updateLink() {
        try {
          const base = await fetchRaw();
          if (!base) throw new Error('url.txt 为空');
          document.getElementById('card-main').href = base + '/';
          document.getElementById('card-dl').href = base + '/download/';
          document.getElementById('status').textContent = '隧道地址：' + base;
          document.getElementById('status').style.color = '#4caf50';
        } catch (e) {
          document.getElementById('status').textContent = '获取隧道地址失败，请稍后刷新';
          document.getElementById('status').style.color = '#f44336';
          console.error(e);
        }
      }

      updateLink();
      setInterval(updateLink, 60000);
    })();
  </script>
</body>
</html>
