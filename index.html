<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACN 下载中心 - 跳转中</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    :root {
      --bg: #1a1a22;
      --text-title: #ffffff;
      --text-dim: #71717a;
      --accent: #7dd3fc;
      --accent-2: #a78bfa;
      --accent-dim: rgba(125,211,252,0.12);
      --danger: #fca5a5;
      --success: #86efac;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse at top, rgba(125,211,252,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at bottom, rgba(167,139,250,0.06) 0%, transparent 50%);
      color: var(--text-dim);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      color: var(--bg);
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(125,211,252,0.2);
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-title);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 32px;
    }
    .status {
      font-size: 14px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--accent-dim);
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }
    .retry-link {
      display: none;
      margin-top: 16px;
      color: var(--accent);
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
    }
    .retry-link.show { display: inline-block; }
    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      padding: 16px;
    }
  </style>
</head>
<body>
  <div class="logo">A</div>
  <div class="title">ACN 下载中心</div>
  <div class="subtitle">口令码兑换 · 文件下载</div>
  <div class="status" id="statusMsg">
    <div class="spinner" id="spinner"></div>
    <span>正在连接服务器...</span>
  </div>
  <div class="retry-link" id="retryLink" onclick="retry()">重试</div>
  <div class="footer">&copy; 2026 ACN 下载中心 All rights reserved.<br>本网站所有权归 忘本的可可 所有</div>

  <script>
    var REPO = 'xnnkk/Wbdkk-AstraXh-HAAVK-ACN';

    function setStatus(text, type) {
      var el = document.getElementById('statusMsg');
      var sp = document.getElementById('spinner');
      el.className = 'status' + (type ? ' ' + type : '');
      el.innerHTML = (type ? '' : '<div class="spinner" id="spinner"></div>') + '<span>' + text + '</span>';
      var retry = document.getElementById('retryLink');
      if (type === 'error') retry.classList.add('show');
      else retry.classList.remove('show');
    }

    function httpGet(url, onSuccess, onError) {
      var xhr = new XMLHttpRequest();
      xhr.timeout = 8000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            onSuccess(xhr.responseText.trim());
          } else {
            onError('HTTP ' + xhr.status);
          }
        }
      };
      xhr.ontimeout = function() { onError('timeout'); };
      xhr.onerror = function() { onError('network error'); };
      try { xhr.open('GET', url, true); xhr.send(); }
      catch (e) { onError(e.message); }
    }

    function fetchTunnelUrl() {
      var sources = [
        'url.txt?t=' + Date.now(),
        'https://cdn.jsdelivr.net/gh/' + REPO + '@main/url.txt?t=' + Date.now(),
        'https://raw.githubusercontent.com/' + REPO + '/main/url.txt?t=' + Date.now()
      ];
      var index = 0;
      function tryNext() {
        if (index >= sources.length) {
          setStatus('⚠ 服务器暂时无法连接，请稍后重试', 'error');
          return;
        }
        var src = sources[index];
        index++;
        httpGet(src, function(text) {
          if (text && text.indexOf('http') === 0) {
            setStatus('✓ 连接成功，正在跳转...', 'success');
            window.location.href = text.replace(/\/+$/, '');
          } else {
            tryNext();
          }
        }, function() { tryNext(); });
      }
      tryNext();
    }

    function retry() {
      setStatus('正在连接服务器...', '');
      fetchTunnelUrl();
    }

    // Auto-start
    fetchTunnelUrl();

    (function() {
      var CURRENT_VERSION = '30';
      try {
        var stored = localStorage.getItem('redirect_portal_version');
        if (stored !== CURRENT_VERSION) {
          localStorage.setItem('redirect_portal_version', CURRENT_VERSION);
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
