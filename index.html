<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACN 客户端 - 选择站点</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    :root {
      --bg: #1a1a22;
      --bg-card: #242430;
      --text-title: #ffffff;
      --text-dim: #71717a;
      --text-body: #a1a1aa;
      --accent: #7dd3fc;
      --accent-2: #a78bfa;
      --accent-dim: rgba(125,211,252,0.12);
      --accent-2-dim: rgba(167,139,250,0.12);
      --danger: #fca5a5;
      --success: #86efac;
      --radius: 14px;
      --transition: 0.25s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse at top, rgba(125,211,252,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at bottom, rgba(167,139,250,0.06) 0%, transparent 50%);
      color: var(--text-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }
    .logo {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 700;
      color: var(--bg);
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(125,211,252,0.2);
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-title);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 36px;
    }
    .card-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .site-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 22px;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      text-align: left;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }
    .site-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }
    .site-card.main::before {
      background: linear-gradient(135deg, var(--accent-dim), transparent);
    }
    .site-card.download::before {
      background: linear-gradient(135deg, var(--accent-2-dim), transparent);
    }
    .site-card:hover::before { opacity: 1; }
    .site-card:hover {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .site-card.main:hover { border-color: rgba(125,211,252,0.4); }
    .site-card.download:hover { border-color: rgba(167,139,250,0.4); }
    .site-card:active { transform: translateY(0); }
    .site-card.loading {
      pointer-events: none;
      opacity: 0.7;
    }
    .card-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .site-card.main .card-icon {
      background: var(--accent-dim);
      color: var(--accent);
    }
    .site-card.download .card-icon {
      background: var(--accent-2-dim);
      color: var(--accent-2);
    }
    .card-body {
      flex: 1;
      position: relative;
      z-index: 1;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-title);
      margin-bottom: 3px;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-dim);
    }
    .card-arrow {
      color: var(--text-dim);
      font-size: 20px;
      transition: all var(--transition);
      position: relative;
      z-index: 1;
    }
    .site-card:hover .card-arrow {
      transform: translateX(4px);
      color: var(--text-body);
    }
    .site-card.main:hover .card-arrow { color: var(--accent); }
    .site-card.download:hover .card-arrow { color: var(--accent-2); }

    /* Loading spinner inside card */
    .card-spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: relative;
      z-index: 1;
    }
    .site-card.loading .card-arrow { display: none; }
    .site-card.loading .card-spinner { display: block; }
    .site-card.download.loading .card-spinner { border-top-color: var(--accent-2); }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status message */
    .status-msg {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
      min-height: 20px;
      transition: color var(--transition);
    }
    .status-msg.error { color: var(--danger); }
    .status-msg.success { color: var(--success); }

    .retry-link {
      display: none;
      margin-top: 8px;
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }
    .retry-link.show { display: inline-block; }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      padding: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">A</div>
    <div class="title">ACN 客户端</div>
    <div class="subtitle">请选择要访问的站点</div>

    <div class="card-group">
      <a class="site-card main" id="mainCard" onclick="goToSite('main')">
        <div class="card-icon">🏠</div>
        <div class="card-body">
          <div class="card-title">主站</div>
          <div class="card-desc">公告 · 近况 · 用户中心 · 服务器报告</div>
        </div>
        <div class="card-spinner"></div>
        <div class="card-arrow">→</div>
      </a>

      <a class="site-card download" id="downloadCard" onclick="goToSite('download')">
        <div class="card-icon">📦</div>
        <div class="card-body">
          <div class="card-title">下载中心</div>
          <div class="card-desc">口令码兑换 · 文件下载</div>
        </div>
        <div class="card-spinner"></div>
        <div class="card-arrow">→</div>
      </a>
    </div>

    <div class="status-msg" id="statusMsg"></div>
    <div class="retry-link" id="retryLink" onclick="clearError()">返回选择</div>
  </div>

  <div class="footer">&copy; 2026 ACN 客户端 All rights reserved.<br>本网站所有权归 忘本的可可 所有</div>

  <script>
    var REPO = 'xnnkk/Wbdkk-AstraXh-HAAVK-ACN';

    function httpGet(url, onSuccess, onError) {
      var xhr = new XMLHttpRequest();
      xhr.timeout = 8000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            onSuccess(xhr.responseText.trim());
          } else {
            onError('HTTP ' + xhr.status);
          }
        }
      };
      xhr.ontimeout = function() { onError('timeout'); };
      xhr.onerror = function() { onError('network error'); };
      try { xhr.open('GET', url, true); xhr.send(); }
      catch (e) { onError(e.message); }
    }

    function fetchTunnelUrl(urlFile, callback) {
      var sources = [
        urlFile + '?t=' + Date.now(),
        'https://cdn.jsdelivr.net/gh/' + REPO + '@main/' + urlFile + '?t=' + Date.now(),
        'https://raw.githubusercontent.com/' + REPO + '/main/' + urlFile + '?t=' + Date.now()
      ];
      var index = 0;
      function tryNext() {
        if (index >= sources.length) {
          callback(null, 'failed');
          return;
        }
        var src = sources[index];
        index++;
        httpGet(src, function(text) {
          if (text && text.indexOf('http') === 0) {
            callback(text, null);
          } else {
            tryNext();
          }
        }, function() { tryNext(); });
      }
      tryNext();
    }

    function goToSite(type) {
      var cardId = type === 'main' ? 'mainCard' : 'downloadCard';
      var otherId = type === 'main' ? 'downloadCard' : 'mainCard';
      var urlFile = type === 'main' ? 'url.txt' : 'url-download.txt';
      var siteName = type === 'main' ? '主站' : '下载中心';
      var statusMsg = document.getElementById('statusMsg');
      var retryLink = document.getElementById('retryLink');

      var card = document.getElementById(cardId);
      var otherCard = document.getElementById(otherId);
      card.classList.add('loading');
      otherCard.style.opacity = '0.4';
      otherCard.style.pointerEvents = 'none';

      statusMsg.className = 'status-msg';
      statusMsg.textContent = '正在连接' + siteName + '...';
      retryLink.classList.remove('show');

      fetchTunnelUrl(urlFile, function(url, err) {
        if (err) {
          card.classList.remove('loading');
          otherCard.style.opacity = '';
          otherCard.style.pointerEvents = '';
          statusMsg.className = 'status-msg error';
          statusMsg.textContent = '⚠ ' + siteName + '暂时无法连接，请稍后重试';
          retryLink.classList.add('show');
          return;
        }
        statusMsg.className = 'status-msg success';
        statusMsg.textContent = '✓ 连接成功，正在跳转到' + siteName + '...';
        window.location.href = url.replace(/\/+$/, '');
      });
    }

    function clearError() {
      var statusMsg = document.getElementById('statusMsg');
      var retryLink = document.getElementById('retryLink');
      statusMsg.className = 'status-msg';
      statusMsg.textContent = '';
      retryLink.classList.remove('show');
      document.getElementById('mainCard').classList.remove('loading');
      document.getElementById('downloadCard').classList.remove('loading');
      document.getElementById('mainCard').style.opacity = '';
      document.getElementById('downloadCard').style.opacity = '';
      document.getElementById('mainCard').style.pointerEvents = '';
      document.getElementById('downloadCard').style.pointerEvents = '';
    }

    (function() {
      var CURRENT_VERSION = '21';
      try {
        var stored = localStorage.getItem('redirect_portal_version');
        if (stored !== CURRENT_VERSION) {
          localStorage.setItem('redirect_portal_version', CURRENT_VERSION);
        }
      } catch (e) {}
    })();
  </script>
</body>
</html>
